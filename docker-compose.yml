services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "55433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbench -d workbench"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
